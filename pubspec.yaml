name: bloom
description: Bloom — Premium LGBTQ+ Dating Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localization / local storage
  shared_preferences: ^2.3.5

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.4
  firebase_database: ^11.1.5
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.5

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Animations
  flutter_animate: ^4.5.0

  # Subscription
  purchases_flutter: ^8.8.1

  # Authentication providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  generate: true
